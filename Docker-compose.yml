services:
  db:
    image: postgres:latest
    container_name: postgres_db_bank
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: BankDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - bank_network  # <-- Add this

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_bank
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - bank_network  # <-- Add this

volumes:
  postgres_data:

networks:
  bank_network:       # <-- Define the network here
    driver: bridge